
<style>
  @import url('https://fonts.googleapis.com/css2?family=Do+Hyeon&family=Noto+Sans+KR:wght@400;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body { background: transparent; }

  .y2k-wrap {
    font-family: 'Noto Sans KR', sans-serif;
    background: linear-gradient(135deg, #ffe4f0 0%, #e4f0ff 50%, #f0ffe4 100%);
    border-radius: 16px;
    border: 2.5px dashed #ff9ecb;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }

  .stars-bg {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
  }

  .star {
    position: absolute;
    font-size: 12px;
    animation: twinkle 1.5s infinite alternate;
  }

  @keyframes twinkle {
    0% { opacity: 0.3; transform: scale(0.8); }
    100% { opacity: 1; transform: scale(1.2); }
  }

  .content { position: relative; z-index: 1; }

  .top-bar {
    background: linear-gradient(90deg, #ff9ecb, #a78bfa, #67e8f9);
    border-radius: 10px 10px 0 0;
    padding: 6px 12px;
    text-align: center;
    font-size: 11px;
    font-weight: 700;
    color: white;
    letter-spacing: 2px;
    margin-bottom: 14px;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.2);
  }

  .title-box {
    background: white;
    border-radius: 14px;
    border: 2px solid #ffb3d9;
    padding: 16px 12px;
    text-align: center;
    margin-bottom: 12px;
    box-shadow: 3px 3px 0px #ffb3d9;
  }

  .heart-title {
    font-size: 22px;
    font-weight: 700;
    background: linear-gradient(135deg, #ff6bb5, #a855f7, #3b82f6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.3;
  }

  .names-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 10px 0;
  }

  .name-chip {
    background: linear-gradient(135deg, #fce7f3, #ede9fe);
    border: 1.5px solid #f9a8d4;
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 16px;
    font-weight: 700;
    color: #9333ea;
  }

  .heart-icon {
    font-size: 22px;
    animation: heartbeat 0.8s infinite alternate;
    display: inline-block;
  }

  @keyframes heartbeat {
    0% { transform: scale(1); }
    100% { transform: scale(1.25); }
  }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }

  .info-card {
    background: white;
    border-radius: 12px;
    border: 2px solid #bfdbfe;
    padding: 10px;
    text-align: center;
    box-shadow: 2px 2px 0px #bfdbfe;
  }

  .info-card.full {
    grid-column: 1 / -1;
    border-color: #bbf7d0;
    box-shadow: 2px 2px 0px #bbf7d0;
  }

  .info-label {
    font-size: 10px;
    color: #a855f7;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .info-value {
    font-size: 13px;
    font-weight: 700;
    color: #1e293b;
    line-height: 1.4;
  }

  .emoji-deco { font-size: 18px; display: block; margin-bottom: 2px; }

  .reaction-box {
    background: white;
    border-radius: 14px;
    border: 2px solid #fde68a;
    padding: 12px;
    margin-bottom: 12px;
    box-shadow: 2px 2px 0px #fde68a;
  }

  .reaction-title {
    text-align: center;
    font-size: 11px;
    color: #d97706;
    font-weight: 700;
    margin-bottom: 10px;
    letter-spacing: 1px;
  }

  .reaction-btns {
    display: flex;
    justify-content: space-around;
    gap: 6px;
  }

  .react-btn {
    background: linear-gradient(135deg, #fef3c7, #fde68a);
    border: 2px solid #f59e0b;
    border-radius: 12px;
    padding: 8px 6px;
    cursor: pointer;
    text-align: center;
    flex: 1;
    transition: transform 0.15s;
    box-shadow: 2px 2px 0px #f59e0b;
    user-select: none;
  }

  .react-btn:active { transform: scale(0.93) translate(2px,2px); box-shadow: none; }

  .react-emoji { font-size: 22px; display: block; margin-bottom: 2px; }
  .react-count {
    font-size: 13px;
    font-weight: 700;
    color: #92400e;
  }

  .visit-box {
    background: white;
    border-radius: 14px;
    border: 2px solid #c4b5fd;
    padding: 12px;
    margin-bottom: 12px;
    box-shadow: 2px 2px 0px #c4b5fd;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .visit-emoji { font-size: 28px; flex-shrink: 0; }

  .visit-info { flex: 1; }

  .visit-label {
    font-size: 10px;
    color: #7c3aed;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .visit-count {
    font-size: 26px;
    font-weight: 700;
    color: #5b21b6;
    line-height: 1;
  }

  .visit-sub {
    font-size: 10px;
    color: #a78bfa;
  }

  .visit-btn {
    background: linear-gradient(135deg, #ede9fe, #ddd6fe);
    border: 2px solid #8b5cf6;
    border-radius: 10px;
    padding: 6px 10px;
    font-size: 11px;
    font-weight: 700;
    color: #5b21b6;
    cursor: pointer;
    box-shadow: 2px 2px 0px #8b5cf6;
    transition: all 0.15s;
  }

  .visit-btn:active { transform: translate(2px,2px); box-shadow: none; }

  .invite-btn {
    display: block;
    width: 100%;
    background: linear-gradient(135deg, #ff6bb5, #a855f7, #3b82f6);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    text-align: center;
    letter-spacing: 1px;
    box-shadow: 3px 3px 0px #7c3aed;
    transition: all 0.15s;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.15);
  }

  .invite-btn:active { transform: translate(3px,3px); box-shadow: none; }

  .guestbook {
    background: white;
    border-radius: 14px;
    border: 2px solid #fbcfe8;
    padding: 12px;
    margin-bottom: 12px;
    box-shadow: 2px 2px 0px #fbcfe8;
  }

  .gb-title {
    font-size: 11px;
    color: #be185d;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 8px;
    text-align: center;
  }

  .gb-entries { margin-bottom: 8px; }

  .gb-entry {
    background: #fdf2f8;
    border-radius: 8px;
    padding: 6px 10px;
    margin-bottom: 6px;
    font-size: 12px;
    color: #831843;
    border-left: 3px solid #f9a8d4;
  }

  .gb-name {
    font-weight: 700;
    font-size: 11px;
    color: #9d174d;
    margin-bottom: 2px;
  }

  .gb-input-row {
    display: flex;
    gap: 6px;
  }

  .gb-input {
    flex: 1;
    border: 1.5px solid #f9a8d4;
    border-radius: 8px;
    padding: 7px 10px;
    font-size: 12px;
    background: #fdf2f8;
    color: #831843;
    outline: none;
    font-family: inherit;
  }

  .gb-input:focus { border-color: #ec4899; }

  .gb-send {
    background: linear-gradient(135deg, #fce7f3, #fbcfe8);
    border: 2px solid #ec4899;
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 12px;
    font-weight: 700;
    color: #9d174d;
    cursor: pointer;
    box-shadow: 2px 2px 0px #ec4899;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .gb-send:active { transform: translate(2px,2px); box-shadow: none; }

  .bottom-deco {
    text-align: center;
    font-size: 12px;
    color: #a855f7;
    margin-top: 8px;
    letter-spacing: 2px;
  }

  .flash { animation: flash 0.3s; }
  @keyframes flash {
    0% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }
</style>

<div class="y2k-wrap">
  <div class="stars-bg" id="starsContainer"></div>

  <div class="content">
    <div class="top-bar">★ Big Data Center's Jieun is getting married! ★</div>

    <div class="title-box">
      <div class="heart-title">💍 결혼합니다 💍</div>
      <div class="names-row">
        <div class="name-chip">서기원</div>
        <span class="heart-icon">💗</span>
        <div class="name-chip">송지은</div>
      </div>
      <div style="font-size:11px; color:#a855f7; letter-spacing:1px; margin-top:4px;">💗💗소중한 분들을 초대합니다💗💗</div>
    </div>

    <div class="info-grid">
      <div class="info-card">
        <span class="emoji-deco">📅</span>
        <div class="info-label">DATE</div>
        <div class="info-value">2026년 5월 16일<br><span style="font-size:11px; color:#64748b;">토요일 오후 1시 50</span></div>
      </div>
      <div class="info-card">
        <span class="emoji-deco">📍</span>
        <div class="info-label">PLACE</div>
        <div class="info-value">아름다운컨벤션웨딩<br><span style="font-size:11px; color:#64748b;">2층 컨벤션홀</span></div>
      </div>
      <div class="info-card full">
        <span class="emoji-deco">🎉</span>
        <div class="info-label">HOSTED BY</div>
        <div class="info-value">빅데이터센터 홍길동 연구원의 결혼을 진심으로 축하합니다!</div>
      </div>
    </div>

    <div class="reaction-box">
      <div class="reaction-title">🎊 축하 리액션 보내기 🎊</div>
      <div class="reaction-btns">
        <div class="react-btn" onclick="addReact(0)">
          <span class="react-emoji">🎉</span>
          <span class="react-count" id="rc0">0</span>
        </div>
        <div class="react-btn" onclick="addReact(1)">
          <span class="react-emoji">💐</span>
          <span class="react-count" id="rc1">0</span>
        </div>
        <div class="react-btn" onclick="addReact(2)">
          <span class="react-emoji">❤️</span>
          <span class="react-count" id="rc2">0</span>
        </div>
        <div class="react-btn" onclick="addReact(3)">
          <span class="react-emoji">🥂</span>
          <span class="react-count" id="rc3">0</span>
        </div>
      </div>
    </div>

    <div class="visit-box">
      <span class="visit-emoji">👀</span>
      <div class="visit-info">
        <div class="visit-label">TODAY VISITORS</div>
        <div class="visit-count" id="visitCount">1</div>
        <div class="visit-sub">지금 이 공지를 보고 있어요!</div>
      </div>
      <button class="visit-btn" onclick="incrementVisit()">방문 도장 !</button>
    </div>

    <button class="invite-btn" onclick="openInvite()">
      💌 모바일 청첩장 보러가기 →
    </button>

    <div class="bottom-deco">✦ ✦ ✦ 지은쌤 행복하세요!!!! 빅데이터센터 일동 ✦ ✦ ✦</div>
  </div>
</div>

<script>
  const starEmojis = ['⭐','✨','💫','🌟','⚡','🌸','💎','🦋'];
  const container = document.getElementById('starsContainer');
  for (let i = 0; i < 18; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.textContent = starEmojis[Math.floor(Math.random() * starEmojis.length)];
    s.style.left = Math.random() * 95 + '%';
    s.style.top = Math.random() * 95 + '%';
    s.style.animationDelay = Math.random() * 2 + 's';
    s.style.animationDuration = (1 + Math.random() * 1.5) + 's';
    s.style.opacity = 0.3 + Math.random() * 0.4;
    container.appendChild(s);
  }

  const counts = [0, 0, 0, 0];
  function addReact(idx) {
    counts[idx]++;
    const el = document.getElementById('rc' + idx);
    el.textContent = counts[idx];
    el.classList.remove('flash');
    void el.offsetWidth;
    el.classList.add('flash');
  }

  let visitCount = Math.floor(Math.random() * 30) + 12;
  document.getElementById('visitCount').textContent = visitCount;

  function incrementVisit() {
    visitCount++;
    const el = document.getElementById('visitCount');
    el.textContent = visitCount;
    el.classList.remove('flash');
    void el.offsetWidth;
    el.classList.add('flash');
  }

  const gbEmojis = ['🌸','🌟','💐','🎉','🦋','💎','🌈','✨'];
  function addGuestbook() {
    const input = document.getElementById('gbInput');
    const msg = input.value.trim();
    if (!msg) return;
    const entry = document.createElement('div');
    entry.className = 'gb-entry';
    const emoji = gbEmojis[Math.floor(Math.random() * gbEmojis.length)];
    entry.innerHTML = '<div class="gb-name">' + emoji + ' 익명의 방문객</div>' + msg;
    document.getElementById('gbEntries').appendChild(entry);
    input.value = '';
    entry.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  document.getElementById('gbInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') addGuestbook();
  });

  function openInvite() {
    alert('여기에 모바일 청첩장 링크를 넣어주세요! 🎊\n\nopenLink("https://청첩장URL") 로 교체하면 돼요.');
  }
</script>
